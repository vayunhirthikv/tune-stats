services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tunestats
      POSTGRES_PASSWORD: tunestats
      POSTGRES_DB: tunestats
    volumes:
      - tunestats_pg:/var/lib/postgresql/data

volumes:
  tunestats_pg:
